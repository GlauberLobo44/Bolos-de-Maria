<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Confeitaria Pro - Sistema Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <button onclick="showPage('pedidos')">Calendário</button>
    <button onclick="showPage('agenda')">Agenda Semanal</button>
    <button onclick="showPage('editar')">Configurações/Cardápio</button>
</nav>

<div id="pedidos" class="page active">
    <div class="controls-cal">
        <select id="selMes" onchange="renderCalendar()"></select>
        <select id="selAno" onchange="renderCalendar()"></select>
    </div>
    <div class="calendar-grid" id="calGrid"></div>
</div>

<div id="agenda" class="page">
    <div class="agenda-layout">
        <div class="sidebar-orders" id="pendentes" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'pendentes')">
            <h3>Pedidos Pendentes</h3>
            <div id="listaCardsPendentes"></div>
        </div>
        <div class="week-grid" id="weekGrid"></div>
    </div>
</div>

<div id="editar" class="page">
    <div class="edit-container">
        <div class="edit-box">
            <h3>👥 Clientes</h3>
            <input type="text" id="searchCli" style="margin-bottom:10px" placeholder="🔍 Pesquisar cliente..." onkeyup="updateEditLists()">
            <input type="text" id="addNomeCli" placeholder="Nome">
            <input type="text" id="addContCli" placeholder="WhatsApp">
            <button onclick="addClienteManual()" style="width:100%; margin-top:5px">Adicionar</button>
            <div id="listClientes" style="margin-top:15px"></div>
        </div>
        <div class="edit-box">
            <h3>🍰 Cardápio</h3>
            <input type="text" id="addNomeItem" placeholder="Nome do item">
            <input type="number" id="addPrecoItem" placeholder="Preço">
            <select id="addTipoItem"><option value="massas">Massa</option><option value="recheios">Recheio</option><option value="coberturas">Cobertura</option><option value="tamanhos">Forma/Tamanho</option></select>
            <button onclick="addItemCardapio()" style="width:100%; margin-top:5px">Adicionar</button>
            <div id="listCardapio" style="margin-top:15px"></div>
        </div>
        <div class="edit-box">
            <h3>⚙️ Configurações</h3>
            <label>Sinal Padrão (R$):</label>
            <input type="number" id="cfgSinal" onchange="config.sinal = parseFloat(this.value) || 0; salvarTudo();">
            <!--
            <button onclick="document.body.classList.toggle('dark-mode'); salvarTudo();" style="width:100%; margin-top:20px; background:#666">Tema Dark/Light</button>
            -->
        </div>
    </div>
</div>

<div class="modal" id="modalListaDia"><div class="modal-content"><h3 id="tituloListaDia"></h3><div id="corpoListaDia"></div><button onclick="openFormPedido()" style="background:#28a745; width:100%; margin-top:15px">+ NOVO PEDIDO</button><button onclick="closeModal('modalListaDia')" style="background:#666; width:100%; margin-top:5px">FECHAR</button></div></div>

<div class="modal" id="modalForm">
    <div class="modal-content">
        <h3 id="modalFormTitle">Pedido</h3>
        <input type="hidden" id="pId">
        <label>Cliente</label><input type="text" id="pNome">
        <label>Contato</label><input type="text" id="pContato">
        <label>Massa</label><select id="pMassa" onchange="calcTotal()"></select>
        <label>Recheio</label><select id="pRecheio" onchange="calcTotal()"></select>
        <label>Camadas</label><input type="number" id="pCamadas" value="1" min="1" onchange="calcTotal()">
        <label>Cobertura</label><select id="pCobertura" onchange="calcTotal()"></select>
        <label>Tamanho</label><select id="pTamanho" onchange="calcTotal()"></select>
        <div style="text-align:right; font-weight:bold; margin:15px 0; color:var(--text)">Total: R$ <span id="totalDisplay">0,00</span></div>
        <button onclick="salvarPedido()" style="width:100%; padding:10px">SALVAR</button>
        <button onclick="closeModal('modalForm')" style="background:#666; width:100%; margin-top:5px">CANCELAR</button>
    </div>
</div>

<div class="modal" id="modalRecibo">
    <div class="modal-content">
        <h3>📄 Recibo</h3>
        <div id="reciboConteudo"></div>
        <button onclick="imprimirRecibo()" style="width:100%; margin-top:15px; background:#28a745; color:white; border:none; padding:10px; cursor:pointer;">IMPRIMIR / PDF</button>
        <button onclick="closeModal('modalRecibo')" style="background:#666; width:100%; margin-top:5px">FECHAR</button>
    </div>
</div>

<script src="main.js"></script>
<script src="https://cdnjs.cloudflare.com"></script>

</body>
</html>
